<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; img-src 'self' data:;">
    <title>Helios Mesh</title>
    <link rel="stylesheet" href="css/helios.css">
</head>
<body class="bg-gray-900 text-white min-h-screen">
    <div class="container mx-auto max-w-3xl p-6">
        <div class="flex items-center justify-between mb-6">
            <div>
                <h1 class="text-2xl font-bold">Mesh</h1>
                <p class="text-sm text-gray-400">Agent coordination network</p>
            </div>
            <div class="status-bar">
                <span class="status-dot connecting" id="status-dot"></span>
                <span id="status-text">Waiting...</span>
            </div>
        </div>

        <div id="agents-grid" class="grid gap-4">
            <div class="bg-gray-800 rounded-lg p-4 border border-gray-700 text-center py-12">
                <p class="text-gray-400">No active mesh agents</p>
                <p class="text-xs text-gray-500 mt-2">Agents will appear here when they join the mesh</p>
            </div>
        </div>
    </div>

    <script>
        window._heliosMeshData = function(data) {
            try {
                const parsed = JSON.parse(data);
                if (parsed.agents) renderAgents(parsed.agents);
                document.getElementById('status-dot').className = 'status-dot connected';
                document.getElementById('status-text').textContent = 'Live';
            } catch (e) {
                console.error('Mesh data parse error:', e);
            }
        };

        function renderAgents(agents) {
            const grid = document.getElementById('agents-grid');
            grid.innerHTML = agents.map(a =>
                `<div class="bg-gray-800 rounded-lg p-4 border border-gray-700">
                    <div class="flex items-center justify-between mb-2">
                        <span class="font-semibold">${a.name}</span>
                        <span class="status-dot ${a.status === 'active' ? 'connected' : 'disconnected'}"></span>
                    </div>
                    <p class="text-xs text-gray-400">${a.role || 'Agent'}</p>
                    ${a.currentTask ? `<p class="text-sm text-blue-400 mt-2">${a.currentTask}</p>` : ''}
                </div>`
            ).join('');
        }

        if (window.__pendingMeshData) {
            try { window._heliosMeshData(window.__pendingMeshData); window.__pendingMeshData = null; } catch(e) {}
        }
    </script>
</body>
</html>
