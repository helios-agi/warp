<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Helios CRM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
        }
        .firm-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
        }
        .stat-card {
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.1) 0%, rgba(147, 51, 234, 0.1) 100%);
        }
    </style>
</head>
<body class="bg-gray-900 text-white min-h-screen">
    <div class="container mx-auto p-6">
        <!-- Header -->
        <div class="flex items-center justify-between mb-8">
            <div>
                <h1 class="text-3xl font-bold">Helios CRM</h1>
                <p class="text-gray-400 mt-1">Manage your professional relationships</p>
            </div>
            <div class="flex space-x-3">
                <button id="refresh-btn" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 rounded-lg transition-colors">
                    Refresh
                </button>
                <button id="add-firm-btn" class="px-4 py-2 bg-purple-600 hover:bg-purple-700 rounded-lg transition-colors">
                    + Add Firm
                </button>
            </div>
        </div>

        <!-- Stats Dashboard -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8">
            <div class="stat-card p-6 rounded-lg border border-gray-700">
                <div class="text-3xl font-bold mb-1" id="total-firms">12</div>
                <div class="text-sm text-gray-400">Total Firms</div>
            </div>
            <div class="stat-card p-6 rounded-lg border border-gray-700">
                <div class="text-3xl font-bold mb-1" id="total-contacts">47</div>
                <div class="text-sm text-gray-400">Contacts</div>
            </div>
            <div class="stat-card p-6 rounded-lg border border-gray-700">
                <div class="text-3xl font-bold mb-1" id="active-deals">8</div>
                <div class="text-sm text-gray-400">Active Deals</div>
            </div>
            <div class="stat-card p-6 rounded-lg border border-gray-700">
                <div class="text-3xl font-bold mb-1 text-green-400" id="conversion-rate">32%</div>
                <div class="text-sm text-gray-400">Conversion Rate</div>
            </div>
        </div>

        <!-- Filters -->
        <div class="flex space-x-4 mb-6">
            <select id="filter-industry" class="px-4 py-2 bg-gray-800 border border-gray-700 rounded-lg text-white">
                <option value="">All Industries</option>
                <option value="technology">Technology</option>
                <option value="finance">Finance</option>
                <option value="healthcare">Healthcare</option>
                <option value="consulting">Consulting</option>
            </select>
            <select id="filter-stage" class="px-4 py-2 bg-gray-800 border border-gray-700 rounded-lg text-white">
                <option value="">All Stages</option>
                <option value="prospect">Prospect</option>
                <option value="engaged">Engaged</option>
                <option value="client">Client</option>
            </select>
        </div>

        <!-- Firms Grid -->
        <div id="firms-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Firm cards will be inserted here -->
        </div>

        <!-- Loading State -->
        <div id="loading" class="text-center text-gray-400 py-12 hidden">
            <p>Loading firms...</p>
        </div>

        <!-- Empty State -->
        <div id="empty-state" class="text-center text-gray-400 py-12 hidden">
            <p>No firms found</p>
        </div>
    </div>

    <script>
        // Placeholder firm data
        const placeholderFirms = [
            {
                id: 1,
                name: "Acme Ventures",
                industry: "Venture Capital",
                stage: "client",
                contacts: [
                    { name: "Sarah Chen", role: "Partner", email: "sarah@acme.vc" },
                    { name: "Mike Johnson", role: "Associate", email: "mike@acme.vc" }
                ],
                lastContact: "2024-04-15",
                dealSize: "$2.5M",
                notes: "Interested in Series A investment"
            },
            {
                id: 2,
                name: "TechCorp Solutions",
                industry: "Technology",
                stage: "engaged",
                contacts: [
                    { name: "Alex Rodriguez", role: "CTO", email: "alex@techcorp.com" }
                ],
                lastContact: "2024-04-20",
                dealSize: "$500K",
                notes: "Evaluating enterprise solutions"
            },
            {
                id: 3,
                name: "Global Finance Partners",
                industry: "Finance",
                stage: "prospect",
                contacts: [
                    { name: "Jordan Taylor", role: "VP Strategy", email: "jordan@gfp.com" }
                ],
                lastContact: "2024-04-10",
                dealSize: "$1.2M",
                notes: "Initial outreach completed"
            },
            {
                id: 4,
                name: "HealthTech Innovations",
                industry: "Healthcare",
                stage: "client",
                contacts: [
                    { name: "Dr. Emily Zhang", role: "CEO", email: "emily@healthtech.io" },
                    { name: "David Park", role: "CFO", email: "david@healthtech.io" }
                ],
                lastContact: "2024-04-28",
                dealSize: "$3.8M",
                notes: "Ongoing partnership, monthly check-ins"
            },
            {
                id: 5,
                name: "Strategic Consulting Group",
                industry: "Consulting",
                stage: "engaged",
                contacts: [
                    { name: "Morgan Williams", role: "Managing Director", email: "morgan@scg.com" }
                ],
                lastContact: "2024-04-22",
                dealSize: "$750K",
                notes: "Proposal sent, awaiting feedback"
            },
            {
                id: 6,
                name: "Innovation Labs",
                industry: "Technology",
                stage: "client",
                contacts: [
                    { name: "Chris Anderson", role: "Founder", email: "chris@innovationlabs.ai" }
                ],
                lastContact: "2024-04-25",
                dealSize: "$1.5M",
                notes: "Pilot program in progress"
            }
        ];

        const stageColors = {
            prospect: 'bg-yellow-500/20 text-yellow-400 border-yellow-500/30',
            engaged: 'bg-blue-500/20 text-blue-400 border-blue-500/30',
            client: 'bg-green-500/20 text-green-400 border-green-500/30'
        };

        // IPC Bridge setup
        window._heliosResponse = function(data) {
            try {
                const result = JSON.parse(data);
                if (result.error) {
                    console.error('Helios IPC Error:', result.error);
                    renderFirms(placeholderFirms);
                } else if (result.data && Array.isArray(result.data)) {
                    // Parse real firm data from Memgraph
                    const firms = result.data.map(row => ({
                        id: row.f.id,
                        name: row.f.name,
                        industry: row.f.industry,
                        stage: row.f.stage || 'prospect',
                        contacts: row.contacts || [],
                        lastContact: row.f.lastContact,
                        dealSize: row.f.dealSize,
                        notes: row.f.notes
                    }));
                    renderFirms(firms);
                    updateStats(firms);
                } else {
                    renderFirms(placeholderFirms);
                }
            } catch (e) {
                console.error('Error parsing Helios response:', e);
                renderFirms(placeholderFirms);
            }
        };

        function updateStats(firms) {
            document.getElementById('total-firms').textContent = firms.length;
            const totalContacts = firms.reduce((sum, f) => sum + (f.contacts?.length || 0), 0);
            document.getElementById('total-contacts').textContent = totalContacts;
            const activeDeals = firms.filter(f => f.stage === 'engaged' || f.stage === 'client').length;
            document.getElementById('active-deals').textContent = activeDeals;
        }

        function formatDate(dateStr) {
            if (!dateStr) return 'No contact';
            const date = new Date(dateStr);
            const now = new Date();
            const diffDays = Math.floor((now - date) / (1000 * 60 * 60 * 24));
            
            if (diffDays === 0) return 'Today';
            if (diffDays === 1) return 'Yesterday';
            if (diffDays < 7) return `${diffDays} days ago`;
            return date.toLocaleDateString();
        }

        function renderFirms(firms) {
            const grid = document.getElementById('firms-grid');
            const loading = document.getElementById('loading');
            const emptyState = document.getElementById('empty-state');

            loading.classList.add('hidden');

            if (!firms || firms.length === 0) {
                grid.innerHTML = '';
                emptyState.classList.remove('hidden');
                return;
            }

            emptyState.classList.add('hidden');
            updateStats(firms);

            grid.innerHTML = firms.map(firm => `
                <div class="firm-card bg-gray-800 rounded-lg p-6 border border-gray-700 cursor-pointer transition-all" data-id="${firm.id}">
                    <!-- Firm Header -->
                    <div class="flex items-start justify-between mb-4">
                        <div class="flex-1">
                            <h3 class="text-xl font-bold mb-1">${firm.name}</h3>
                            <p class="text-sm text-gray-400">${firm.industry}</p>
                        </div>
                        <span class="px-3 py-1 rounded-full text-xs font-semibold border ${stageColors[firm.stage] || stageColors.prospect}">
                            ${firm.stage.toUpperCase()}
                        </span>
                    </div>

                    <!-- Deal Size -->
                    <div class="mb-4 pb-4 border-b border-gray-700">
                        <div class="text-2xl font-bold text-blue-400">${firm.dealSize}</div>
                        <div class="text-sm text-gray-500">Deal Value</div>
                    </div>

                    <!-- Contacts -->
                    <div class="mb-4">
                        <div class="text-sm text-gray-400 mb-2">Key Contacts</div>
                        <div class="space-y-2">
                            ${firm.contacts.slice(0, 2).map(contact => `
                                <div class="flex items-center space-x-2">
                                    <div class="w-8 h-8 bg-gradient-to-br from-purple-500 to-pink-600 rounded-full flex items-center justify-center text-xs font-semibold">
                                        ${contact.name.split(' ').map(n => n[0]).join('').toUpperCase()}
                                    </div>
                                    <div class="flex-1 min-w-0">
                                        <div class="text-sm font-medium truncate">${contact.name}</div>
                                        <div class="text-xs text-gray-500 truncate">${contact.role}</div>
                                    </div>
                                </div>
                            `).join('')}
                            ${firm.contacts.length > 2 ? `
                                <div class="text-xs text-gray-500">+${firm.contacts.length - 2} more</div>
                            ` : ''}
                        </div>
                    </div>

                    <!-- Last Contact -->
                    <div class="flex items-center justify-between text-sm">
                        <span class="text-gray-500">Last contact:</span>
                        <span class="text-gray-300">${formatDate(firm.lastContact)}</span>
                    </div>

                    <!-- Notes Preview -->
                    ${firm.notes ? `
                        <div class="mt-3 pt-3 border-t border-gray-700">
                            <p class="text-sm text-gray-400 line-clamp-2">${firm.notes}</p>
                        </div>
                    ` : ''}
                </div>
            `).join('');

            // Add click handlers
            document.querySelectorAll('.firm-card').forEach(card => {
                card.addEventListener('click', function() {
                    const firmId = this.getAttribute('data-id');
                    console.log('Firm clicked:', firmId);
                    // Future: Open firm detail view
                });
            });
        }

        function queryFirms() {
            const loading = document.getElementById('loading');
            loading.classList.remove('hidden');

            if (window.helios && window.helios.postMessage) {
                window.helios.postMessage(JSON.stringify({
                    type: "operation",
                    name: "crm.firms",
                    params: {limit: 50}
                }));
            } else {
                // IPC not available, use placeholder data
                console.log('Helios IPC bridge not available, using placeholder data');
                setTimeout(() => renderFirms(placeholderFirms), 500);
            }
        }

        // Event handlers
        document.getElementById('refresh-btn').addEventListener('click', queryFirms);
        document.getElementById('add-firm-btn').addEventListener('click', () => {
            console.log('Add firm clicked');
            // Future: Open add firm modal
        });

        // Filter handlers
        document.getElementById('filter-industry').addEventListener('change', function() {
            const industry = this.value;
            // Future: Filter firms by industry
            console.log('Filter by industry:', industry);
        });

        document.getElementById('filter-stage').addEventListener('change', function() {
            const stage = this.value;
            // Future: Filter firms by stage
            console.log('Filter by stage:', stage);
        });

        // Initial load
        queryFirms();
    </script>
</body>
</html>
